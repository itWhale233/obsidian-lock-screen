name: Build And Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建插件
        run: npm run build

      - name: 生成发布标签
        run: |
          echo "RELEASE_TAG=auto-build-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=自动构建 ${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: 创建 Release 并上传产物
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
            versions.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
