name: Build And Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 判断是否需要发布
        id: version_check
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          git fetch --tags --force >/dev/null 2>&1 || true

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "检测到标签 ${TAG} 已存在，本次跳过发布。"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "检测到新版本 ${TAG}，将执行发布。"
          fi

      - name: 安装依赖
        if: steps.version_check.outputs.should_release == 'true'
        run: npm ci

      - name: 构建插件
        if: steps.version_check.outputs.should_release == 'true'
        run: npm run build

      - name: 打包发布附件
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.version_check.outputs.release_tag }}"
          ZIP_NAME="lock-screen-${RELEASE_TAG}.zip"
          zip -j "$ZIP_NAME" main.js manifest.json styles.css versions.json
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: 创建 Gitea Release 并上传产物
        if: steps.version_check.outputs.should_release == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          ZIP_NAME: ${{ env.ZIP_NAME }}
        run: |
          set -euo pipefail

          if [ -z "${GITEA_TOKEN:-}" ]; then
            echo "缺少 GITEA_TOKEN，请在仓库 Secrets 中配置。"
            exit 1
          fi

          export RELEASE_NAME="${RELEASE_TAG}"

          node -e "const fs=require('node:fs'); const payload={tag_name:process.env.RELEASE_TAG,target:process.env.COMMIT_SHA,name:process.env.RELEASE_NAME,body:'按版本号自动发布构建产物（main.js/manifest.json/styles.css/versions.json 及 zip 打包）',draft:false,prerelease:false}; fs.writeFileSync('release-payload.json', JSON.stringify(payload));"

          API_BASE="${SERVER_URL}/api/v1"

          RELEASE_RESPONSE=$(curl -sS -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @release-payload.json \
            "${API_BASE}/repos/${REPOSITORY}/releases")

          RELEASE_ID=$(printf '%s' "${RELEASE_RESPONSE}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);if(!j.id){process.stderr.write(d);process.exit(1);}process.stdout.write(String(j.id));}catch{process.stderr.write(d);process.exit(1);}})")

          for file in main.js manifest.json styles.css versions.json "${ZIP_NAME}"; do
            curl -sS -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${file}" \
              "${API_BASE}/repos/${REPOSITORY}/releases/${RELEASE_ID}/assets?name=${file}" >/dev/null
          done

      - name: 跳过发布说明
        if: steps.version_check.outputs.should_release != 'true'
        run: echo "当前 push 未产生新版本号，已跳过 Release。"
